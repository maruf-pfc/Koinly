plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    id "com.google.gms.google-services"
    id "com.google.firebase.crashlytics"
}

android {
    namespace = "com.siamapps.koinly"
    compileSdk = 36
    ndkVersion = "28.2.13676358"

    defaultConfig {
        applicationId = "com.siamapps.koinly"
        minSdk = 23
        targetSdk = 36
        versionCode = 68
        versionName = "1.0.67"
        multiDexEnabled true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
        coreLibraryDesugaringEnabled true
    }

    kotlinOptions {
        jvmTarget = "17"
    }

    def koinlyBundledReleaseKeystore = file("koinly-release.jks")

    signingConfigs {
        release {
            if (koinlyBundledReleaseKeystore.exists()) {
                storeFile koinlyBundledReleaseKeystore
                storePassword "koinly-release"
                keyAlias "koinly"
                keyPassword "koinly-release"
            }
        }
    }

    buildTypes {
        release {
            // Use a stable bundled development release key so APKs built on GitHub Actions
            // can update each other. Random CI debug keys break Android in-place updates.
            signingConfig koinlyBundledReleaseKeystore.exists() ? signingConfigs.release : signingConfigs.debug
            minifyEnabled false
            shrinkResources false
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
        debug {
            applicationIdSuffix ".debug"
            versionNameSuffix "-debug"
        }
    }
}

flutter {
    source = "../.."
}


dependencies {
    coreLibraryDesugaring "com.android.tools:desugar_jdk_libs:2.1.5"
}
