name: koinly_flutter
description: Flutter rebuild of the Koinly personal finance tracker with adaptive Material 3 UI for Android and Windows.
publish_to: "none"
version: 1.0.70+71
environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.7
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  sqflite_common_ffi: ^2.4.2
  sqlite3: ^3.0.0
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.5.1
  fl_chart: ^0.69.0
  pdf: ^3.11.1
  printing: ^5.13.3
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  local_auth: ^2.3.0
  flutter_local_notifications: ^17.2.3
  flutter_secure_storage: ^10.3.1
  http: ^1.2.2
  mongo_dart: ^0.10.9
  timezone: ^0.9.4
  url_launcher: ^6.3.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
