name: koinly_flutter
description: Flutter rebuild of the Koinly personal finance tracker with Material 3 Expressive UI.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.4
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  uuid: ^4.5.1
  fl_chart: ^0.69.0
  pdf: ^3.11.1
  printing: ^5.13.3
  share_plus: ^10.0.2
  file_picker: ^8.1.2
  local_auth: ^2.3.0
  flutter_local_notifications: ^17.2.3
  http: ^1.2.2
  timezone: ^0.9.4
  url_launcher: ^6.3.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
